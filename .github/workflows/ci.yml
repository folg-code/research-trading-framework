name: CI

on:
  pull_request:
    branches:
      - main
      - "sprint/**"
  push:
    branches:
      - main
      - "sprint/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.22"
          enable-cache: true

      - name: Install project
        run: uv sync --locked --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.22"
          enable-cache: true

      - name: Install project
        run: uv sync --locked --dev

      - name: Run unit tests
        run: >
          uv run pytest
          tests/unit
          --cov=trading_framework
          --cov-report=term-missing
          --cov-report=xml
          -q

  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.22"
          enable-cache: true

      - name: Install project
        run: uv sync --locked --dev

      - name: Run integration tests
        run: uv run pytest tests/integration -q

  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.22"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Show build artifacts
        run: ls -la dist/
