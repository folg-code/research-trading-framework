name: Deploy dashboard

on:
  push:
    branches:
      - main
    paths:
      - "apps/dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dashboard
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: dashboard-vps

    steps:
      - name: Prepare deploy SSH key
        env:
          DASHBOARD_VPS_SSH_KEY: ${{ secrets.DASHBOARD_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DASHBOARD_VPS_SSH_KEY}" ]; then
            echo "DASHBOARD_VPS_SSH_KEY is empty (check Environment dashboard-vps secrets)." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip Windows CR so OpenSSH accepts keys pasted from PowerShell.
          printf '%s\n' "${DASHBOARD_VPS_SSH_KEY}" | tr -d '\r' > ~/.ssh/dashboard_deploy
          chmod 600 ~/.ssh/dashboard_deploy
          if ! ssh-keygen -y -f ~/.ssh/dashboard_deploy >/dev/null; then
            echo "DASHBOARD_VPS_SSH_KEY is not a usable private key." >&2
            exit 1
          fi
          echo "Loaded deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/dashboard_deploy

      - name: Deploy over SSH
        env:
          DASHBOARD_VPS_HOST: ${{ secrets.DASHBOARD_VPS_HOST }}
          DASHBOARD_VPS_USER: ${{ secrets.DASHBOARD_VPS_USER }}
          DASHBOARD_VPS_PORT: ${{ secrets.DASHBOARD_VPS_PORT }}
          DASHBOARD_VPS_REPO_PATH: ${{ secrets.DASHBOARD_VPS_REPO_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${DASHBOARD_VPS_HOST}" ] || [ -z "${DASHBOARD_VPS_USER}" ] || [ -z "${DASHBOARD_VPS_REPO_PATH}" ]; then
            echo "Missing required dashboard-vps secrets (HOST/USER/REPO_PATH)." >&2
            exit 1
          fi
          PORT="${DASHBOARD_VPS_PORT:-22}"
          ssh -i ~/.ssh/dashboard_deploy \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              -o StrictHostKeyChecking=accept-new \
              -p "${PORT}" \
              "${DASHBOARD_VPS_USER}@${DASHBOARD_VPS_HOST}" \
              "set -euo pipefail
               cd '${DASHBOARD_VPS_REPO_PATH}'
               git fetch origin main
               git checkout main
               git pull --ff-only origin main
               cd apps/dashboard
               docker compose -f deploy/docker-compose.yml up --build -d"
