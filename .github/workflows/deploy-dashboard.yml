name: Deploy dashboard

on:
  push:
    branches:
      - main
    paths:
      - "apps/dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dashboard
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: dashboard-vps

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DASHBOARD_VPS_HOST }}
          username: ${{ secrets.DASHBOARD_VPS_USER }}
          key: ${{ secrets.DASHBOARD_VPS_SSH_KEY }}
          port: ${{ secrets.DASHBOARD_VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO_PATH="${{ secrets.DASHBOARD_VPS_REPO_PATH }}"
            if [ -z "${REPO_PATH}" ]; then
              echo "DASHBOARD_VPS_REPO_PATH secret is empty" >&2
              exit 1
            fi
            cd "${REPO_PATH}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cd apps/dashboard
            docker compose -f deploy/docker-compose.yml up --build -d
