services:
  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: trading-dashboard:local
    environment:
      DASHBOARD_STORAGE_ROOT: /data
    volumes:
      - type: bind
        source: ${DASHBOARD_STORAGE_HOST_PATH:-../../user_data}
        target: /data
        read_only: true
    expose:
      - "8501"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    depends_on:
      dashboard:
        condition: service_healthy
    ports:
      - "${DASHBOARD_HTTP_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
